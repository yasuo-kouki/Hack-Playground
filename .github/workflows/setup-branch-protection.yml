name: Setup Branch Protection

on:
  # Run manually to (re-)apply branch protection rules at any time.
  workflow_dispatch:
  # Run automatically on a weekly schedule to ensure protection stays in place.
  schedule:
    - cron: '0 0 * * 0'

jobs:
  setup-branch-protection:
    runs-on: ubuntu-latest
    permissions:
      # Required for GITHUB_TOKEN to update branch protection rules.
      # For organization-owned repos a PAT with 'repo' scope may be needed;
      # store it as a secret and replace ${{ secrets.GITHUB_TOKEN }} below.
      administration: write
    steps:
      - name: Configure main branch protection
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
              required_status_checks: null,
              enforce_admins: true,
              required_pull_request_reviews: {
                // Invalidate existing approvals when new commits are pushed.
                dismiss_stale_reviews: true,
                // Require at least one approving review.
                required_approving_review_count: 1,
                // Prevent the last pusher (i.e., the PR author) from approving
                // their own pull request.
                require_last_push_approval: true,
              },
              restrictions: null,
            });
            console.log('Branch protection configured successfully.');
